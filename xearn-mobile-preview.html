<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XEARN — Mobile App Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080e1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #f1f5f9;
    padding: 20px;
  }

  .showcase {
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 1100px;
  }

  .phone {
    width: 375px;
    height: 790px;
    background: #0c1222;
    border-radius: 44px;
    border: 3px solid #1c2a42;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 60px rgba(20,184,166,0.06), 0 20px 60px rgba(0,0,0,0.6);
  }

  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 30px;
    background: #0c1222;
    border-radius: 0 0 18px 18px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .phone-notch .camera {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1c2a42;
    border: 1px solid #2a3a52;
  }
  .phone-notch .speaker {
    width: 50px; height: 4px;
    border-radius: 2px;
    background: #1c2a42;
  }

  .phone-time {
    position: absolute;
    top: 12px;
    left: 28px;
    z-index: 101;
    font-size: 12px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: 0.3px;
  }
  .phone-battery {
    position: absolute;
    top: 14px;
    right: 24px;
    z-index: 101;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #f1f5f9;
  }
  .phone-battery .batt {
    width: 18px; height: 10px;
    border: 1.5px solid #f1f5f9;
    border-radius: 2px;
    padding: 1px;
  }
  .phone-battery .batt-inner {
    width: 75%; height: 100%;
    background: #22c55e;
    border-radius: 1px;
  }

  .phone-screen {
    height: 100%;
    padding: 38px 14px 10px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #1c2a42 transparent;
  }
  .phone-screen::-webkit-scrollbar { width: 3px; }
  .phone-screen::-webkit-scrollbar-thumb { background: #1c2a42; border-radius: 3px; }

  /* Tab bar */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: #162032;
    border-top: 1px solid rgba(51,65,85,0.4);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 8px;
    z-index: 99;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 4px 8px;
    cursor: pointer;
    border: none;
    background: none;
    color: #64748b;
    font-size: 10px;
    font-weight: 600;
    transition: color 0.2s;
  }
  .tab-item.active { color: #14b8a6; }
  .tab-item svg { width: 22px; height: 22px; }

  .home-indicator {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 5px;
    border-radius: 3px;
    background: #334155;
    z-index: 100;
  }

  /* Navigation */
  .nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .nav h2 {
    font-size: 20px;
    font-weight: 800;
    color: #e2e8f0;
    margin-bottom: 6px;
  }
  .nav p {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 10px;
  }
  .screen-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .screen-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid rgba(51,65,85,0.4);
    background: #162032;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .screen-btn:hover {
    background: #1c2a42;
    border-color: rgba(20,184,166,0.3);
  }
  .screen-btn.active {
    background: rgba(20,184,166,0.12);
    border-color: #14b8a6;
    color: #14b8a6;
  }

  .screen-info {
    background: #162032;
    border-radius: 14px;
    padding: 20px;
    border: 1px solid rgba(51,65,85,0.4);
    max-width: 380px;
    min-width: 300px;
  }
  .screen-info h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .screen-info p {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 6px;
  }
  .screen-info ul {
    padding-left: 18px;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
  }
  .screen-info .features {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .screen-info .feature-tag {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(20,184,166,0.1);
    color: #5eead4;
    border: 1px solid rgba(20,184,166,0.15);
  }

  .screen-info .feature-tag.gold { background: rgba(245,158,11,0.1); color: #fbbf24; border-color: rgba(245,158,11,0.15); }
  .screen-info .feature-tag.purple { background: rgba(168,85,247,0.1); color: #c084fc; border-color: rgba(168,85,247,0.15); }

  /* Screens CSS */
  .screen-content { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .screen-content > * { animation: fadeIn 0.3s ease-out both; }
  .screen-content > *:nth-child(1) { animation-delay: 0s; }
  .screen-content > *:nth-child(2) { animation-delay: 0.08s; }
  .screen-content > *:nth-child(3) { animation-delay: 0.16s; }
  .screen-content > *:nth-child(4) { animation-delay: 0.24s; }
  .screen-content > *:nth-child(5) { animation-delay: 0.32s; }
  .screen-content > *:nth-child(6) { animation-delay: 0.40s; }

  /* Dashboard specific */
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .dash-greeting { font-size: 13px; color: #94a3b8; }
  .dash-name { font-size: 22px; font-weight: 800; color: #f1f5f9; }
  .dash-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: #14b8a6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800; font-size: 15px; color: #fff;
  }

  .balance-card {
    background: linear-gradient(135deg, #162032 0%, #1c2a42 100%);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(20,184,166,0.12);
    margin-bottom: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .balance-label { font-size: 13px; color: #94a3b8; margin-bottom: 2px; }
  .balance-amount { font-size: 34px; font-weight: 900; color: #14b8a6; letter-spacing: -1px; }
  .balance-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-primary {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    background: #14b8a6; padding: 12px; border-radius: 12px;
    font-weight: 700; font-size: 14px; color: #fff;
    border: none; cursor: pointer;
    box-shadow: 0 0 20px rgba(20,184,166,0.2);
  }
  .btn-secondary {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    background: #1c2a42; padding: 12px; border-radius: 12px;
    font-weight: 600; font-size: 14px; color: #f1f5f9;
    border: 1px solid rgba(51,65,85,0.4); cursor: pointer;
  }

  .stats-row {
    display: flex; gap: 10px; margin-bottom: 18px;
  }
  .stat-card {
    flex: 1;
    background: #162032;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    border: 1px solid rgba(51,65,85,0.4);
  }
  .stat-icon {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 6px; font-size: 14px;
  }
  .stat-value { font-size: 15px; font-weight: 800; color: #f1f5f9; }
  .stat-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .section-title { font-size: 17px; font-weight: 700; color: #f1f5f9; }
  .section-link { font-size: 12px; color: #14b8a6; font-weight: 600; }

  .task-item {
    display: flex; align-items: center; gap: 12px;
    background: #162032; border-radius: 12px; padding: 12px;
    margin-bottom: 6px; border: 1px solid rgba(51,65,85,0.4);
  }
  .task-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(20,184,166,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .task-info { flex: 1; }
  .task-title { font-size: 13px; font-weight: 600; color: #f1f5f9; }
  .task-date { font-size: 10px; color: #64748b; }
  .task-reward { font-size: 14px; font-weight: 800; color: #f59e0b; }

  .empty-state {
    text-align: center; padding: 28px 16px;
    background: #162032; border-radius: 14px;
    border: 1px solid rgba(51,65,85,0.4);
    margin-bottom: 12px;
  }
  .empty-state p { font-size: 13px; color: #94a3b8; line-height: 1.5; }
  .empty-state .big-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

  .tier-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
    background: rgba(245,158,11,0.12); color: #f59e0b;
    border: 1px solid rgba(245,158,11,0.15);
  }
  .tier-badge.vip {
    background: rgba(168,85,247,0.12); color: #c084fc;
    border-color: rgba(168,85,247,0.15);
  }

  .wallet-monthly {
    display: flex; background: #1c2a42; border-radius: 12px;
    padding: 12px; margin-bottom: 14px;
  }
  .wallet-monthly > div { flex: 1; text-align: center; }
  .wallet-monthly .ml { font-size: 10px; color: #64748b; margin-bottom: 4px; }
  .wallet-monthly .mv { font-size: 15px; font-weight: 800; color: #f1f5f9; }
  .wallet-monthly .mv.danger { color: #ef4444; }

  .tier-row {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .tier-card {
    flex: 1; background: #162032; border-radius: 14px;
    padding: 18px; text-align: center;
    border: 1px solid;
    cursor: pointer;
  }
  .tier-card .tier-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 8px;
  }

  .tx-item {
    display: flex; align-items: center; gap: 10px;
    background: #162032; border-radius: 10px;
    padding: 10px; margin-bottom: 5px;
    border: 1px solid rgba(51,65,85,0.4);
  }
  .tx-icon {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .tx-info { flex: 1; }
  .tx-type { font-size: 13px; font-weight: 600; color: #f1f5f9; }
  .tx-date { font-size: 10px; color: #64748b; }
  .tx-amount { font-size: 14px; font-weight: 800; }

  /* Profile */
  .profile-card {
    text-align: center; padding: 22px;
    background: #162032; border-radius: 18px; margin-bottom: 14px;
    border: 1px solid rgba(51,65,85,0.4);
  }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 32px;
    background: #14b8a6; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px; font-size: 22px; font-weight: 800; color: #fff;
    position: relative;
  }
  .profile-avatar::after {
    content: ''; position: absolute; inset: -3px;
    border-radius: 35px; border: 2px solid rgba(20,184,166,0.3);
  }
  .profile-name { font-size: 18px; font-weight: 700; color: #f1f5f9; }
  .profile-email { font-size: 12px; color: #94a3b8; margin: 4px 0 8px; }

  .streak-bar {
    display: flex; align-items: center; justify-content: space-around;
    background: #162032; border-radius: 14px; padding: 14px;
    margin-bottom: 14px; border: 1px solid rgba(51,65,85,0.4);
  }
  .streak-bar .flame { font-size: 24px; }
  .streak-label { font-size: 11px; color: #94a3b8; }
  .streak-val { font-size: 18px; font-weight: 800; color: #f1f5f9; }

  .quick-actions {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .qa-card {
    flex: 1; background: #162032; border-radius: 12px;
    padding: 12px; text-align: center;
    border: 1px solid rgba(51,65,85,0.4); cursor: pointer;
  }
  .qa-card .qa-icon { font-size: 20px; margin-bottom: 4px; }
  .qa-card .qa-label { font-size: 10px; color: #94a3b8; }

  .badge-scroll {
    display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
    margin-bottom: 14px;
  }
  .badge-scroll::-webkit-scrollbar { height: 2px; }
  .badge-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .badge-item {
    min-width: 70px; background: #162032; border-radius: 12px;
    padding: 12px 8px; text-align: center;
    border: 1px solid rgba(51,65,85,0.4);
  }
  .badge-item.locked { opacity: 0.45; }
  .badge-icon { font-size: 24px; margin-bottom: 4px; }
  .badge-name { font-size: 10px; font-weight: 600; color: #f1f5f9; }
  .badge-progress { font-size: 9px; color: #64748b; margin-top: 2px; }

  .notif-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: #162032; border-radius: 10px; padding: 10px;
    margin-bottom: 5px; border: 1px solid rgba(51,65,85,0.4);
  }
  .notif-item.unread { border-color: rgba(20,184,166,0.3); }
  .notif-dot {
    width: 16px; padding-top: 3px; text-align: center;
  }
  .notif-dot .pulse {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: #14b8a6;
  }
  .notif-content { flex: 1; }
  .notif-title { font-size: 13px; font-weight: 600; color: #f1f5f9; }
  .notif-msg { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .notif-date { font-size: 10px; color: #64748b; margin-top: 4px; }

  /* Referral code */
  .ref-code {
    text-align: center; padding: 18px;
    background: #162032; border-radius: 14px; margin-bottom: 14px;
    border: 1px solid rgba(20,184,166,0.15);
  }
  .ref-code .code-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  .ref-code .code-value {
    font-size: 26px; font-weight: 900; color: #14b8a6;
    letter-spacing: 3px; margin-bottom: 6px;
  }
  .ref-code .code-actions {
    display: flex; gap: 10px; justify-content: center; margin-top: 10px;
  }
  .ref-code .code-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 16px; border-radius: 8px; font-size: 12px;
    font-weight: 700; color: #fff; background: #14b8a6;
    border: none; cursor: pointer;
  }
  .ref-code .code-btn.share { background: #f59e0b; }

  .ref-stats {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .ref-stat {
    flex: 1; background: #162032; border-radius: 12px;
    padding: 14px; text-align: center;
    border: 1px solid rgba(51,65,85,0.4);
  }
</style>
</head>
<body>
<div class="showcase">
  <div class="phone" id="phone">
    <div class="phone-notch">
      <div class="speaker"></div>
      <div class="camera"></div>
    </div>
    <div class="phone-time">12:00</div>
    <div class="phone-battery">
      <span>95%</span>
      <div class="batt"><div class="batt-inner"></div></div>
    </div>

    <div class="phone-screen" id="screen">
      <!-- Content injected by JS -->
    </div>

    <div class="tab-bar">
      <button class="tab-item active" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Accueil</span>
      </button>
      <button class="tab-item" data-tab="wallet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="16" cy="12" r="2"/></svg>
        <span>Wallet</span>
      </button>
      <button class="tab-item" data-tab="tasks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="5" cy="6" r="1" fill="currentColor"/><circle cx="5" cy="12" r="1" fill="currentColor"/><circle cx="5" cy="18" r="1" fill="currentColor"/></svg>
        <span>Tâches</span>
      </button>
      <button class="tab-item" data-tab="referrals">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

      <button class="tab-item" data-tab="more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="5" cy="12" r="1" fill="currentColor"/><circle cx="19" cy="12" r="1" fill="currentColor"/></svg>
        <span>Plus</span>
      </button>
    </div>
    <div class="home-indicator"></div>
  </div>

  <div class="screen-info" id="info">
    <h3>🏠 Dashboard</h3>
    <p>Écran d'accueil avec animations premium :</p>
    <ul>
      <li>Balance animée (pulse au changement)</li>
      <li>Cartes stats avec icônes glow</li>
      <li>Tâches récentes en cascade animée</li>
      <li>Pull-to-refresh stylisé</li>
      <li>Skeleton loader shimmer</li>
    </ul>
    <div class="features">
      <span class="feature-tag">Reanimated</span>
      <span class="feature-tag">AnimatedBalance</span>
      <span class="feature-tag">Fade + Slide</span>
      <span class="feature-tag gold">Fintech Premium</span>
    </div>
  </div>
</div>

<script>
  const screens = {
    dashboard: renderDashboard,
    wallet: renderWallet,
    tasks: renderTasks,
    referrals: renderReferrals,
    more: renderMore,
  };

  const info = {
    dashboard: { title: '🏠 Dashboard', desc: 'Écran d\'accueil avec animations premium :', items: ['Balance animée (pulse au changement)', 'Cartes stats avec icônes glow', 'Tâches récentes en cascade animée', 'Pull-to-refresh stylisé', 'Skeleton loader shimmer'], tags: ['Reanimated', 'AnimatedBalance', 'Fade + Slide', 'gold|Fintech Premium'] },
    wallet: { title: '💳 Wallet', desc: 'Portefeuille complet avec :', items: ['Balance animée haute précision', 'Stats gains/retraits du mois', 'Upgrade tiers Premium/VIP', 'Transactions récentes animées', 'Bouton retrait avec glow'], tags: ['AnimatedCounter', 'Monthly Stats', 'Tier Cards', 'purple|VIP'], },
    tasks: { title: '📋 Tâches', desc: 'Gestion des tâches gamifiée :', items: ['Filtres par type avec icônes', 'Badges tier requis (Premium/VIP)', 'Boutons Démarrer/Terminer', 'Animation cascade par carte', 'État vide stylisé'], tags: ['TaskCard', 'Stagger Animation', 'Type Badges'] },
    referrals: { title: '👥 Parrainage', desc: 'Système de parrainage social :', items: ['Code parrainage copiable/partageable', 'Stats L1/L2/L3 en temps réel', 'Arbre réseau avec états Actif/Inactif', 'Commissions détaillées', 'Animation progressive'], tags: ['AnimatedCard', 'Copy/Share', 'Referral Tree', 'gold|Commissions'] },
    more: { title: '⚙️ Plus', desc: 'Profil et paramètres :', items: ['Avatar premium avec cerclage', 'Streak flamme animé', 'Badges scrollables verrouillés/débloqués', 'Notifications avec pulsation live', 'Quick actions (stats, paramètres, aide)'], tags: ['PulsingDot', 'Streak Flame', 'Horizontal Scroll', 'purple|Badges'] },
  };

  function switchScreen(name) {
    const screen = document.getElementById('screen');
    screen.innerHTML = screens[name]();

    // Update tab buttons
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.tab === name);
    });

    // Update info
    const inf = info[name];
    const infoEl = document.getElementById('info');
    infoEl.innerHTML = `
      <h3>${inf.title}</h3>
      <p>${inf.desc}</p>
      <ul>${inf.items.map(i => `<li>${i}</li>`).join('')}</ul>
      <div class="features">
        ${inf.tags.map(t => {
          const [cls, label] = t.includes('|') ? t.split('|') : ['', t];
          return `<span class="feature-tag ${cls}">${label || t}</span>`;
        }).join('')}
      </div>
    `;
  }

  // Click handlers
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.addEventListener('click', () => switchScreen(tab.dataset.tab));
  });

  // Initial render
  switchScreen('dashboard');
</script>
