services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xearn_password}
      POSTGRES_DB: ${POSTGRES_DB:-xearn_db}
    volumes:
      - xearn-staging-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "pg_isready -U ${POSTGRES_USER:-xearn} -d ${POSTGRES_DB:-xearn_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://xearn:xearn_password@postgres:5432/xearn_db?schema=public}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PAYMENT_MODE: ${PAYMENT_MODE:-mock}
      FEDAPAY_SECRET_KEY: ${FEDAPAY_SECRET_KEY:-}
      FEDAPAY_PUBLIC_KEY: ${FEDAPAY_PUBLIC_KEY:-}
      FEDAPAY_ENV: ${FEDAPAY_ENV:-sandbox}
      FEDAPAY_CALLBACK_URL: ${FEDAPAY_CALLBACK_URL:-http://localhost:4000/api/payment/webhook}
      FEDAPAY_WEBHOOK_SECRET: ${FEDAPAY_WEBHOOK_SECRET:-}
    command:
      [
        'sh',
        '-c',
        'npm run db:push --workspace=apps/api && node apps/api/dist/main.js',
      ]
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://localhost:4000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        WEB_URL: ${WEB_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}

volumes:
  xearn-staging-postgres-data: