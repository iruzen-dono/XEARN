name: 'CI/CD Pipeline'

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    name: 'Build & Test'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xearn_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/xearn_test
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Run linter'
        run: npm run lint

      - name: 'Build API'
        run: npm run build:api

      - name: 'Generate Prisma client'
        run: npm run db:generate

      - name: 'Run Prisma migrations'
        run: npm run db:migrate:prod

      - name: 'Run tests'
        run: npm run test

      - name: 'Build frontend'
        run: npm run build:web

  deploy-staging:
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: 'Deploy to Staging'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: 'Deploy API to Railway (staging)'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Triggering Railway deployment for staging...');

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: 'Deploy to Production'
    needs: test

    environment:
      name: production
      url: https://xearn.com

    steps:
      - uses: actions/checkout@v4

      - name: 'Deploy API to Railway (production)'
        run: echo "Deployed via Railway GitHub integration"

      - name: 'Notify Slack'
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "XEARN production deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production deployment initiated*\n\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  smoke-tests:
    if: github.event_name == 'push' && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-latest
    name: 'Smoke Tests'
    needs: [deploy-staging, deploy-production]

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Install Playwright browsers'
        run: npx playwright install --with-deps chromium

      - name: 'Run smoke tests'
        run: npx playwright test --project=chromium
        working-directory: apps/web
        env:
          API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.xearn.com' || 'https://staging-api.xearn.railway.app' }}
          WEB_URL: ${{ github.ref == 'refs/heads/main' && 'https://xearn.com' || 'https://staging.xearn.vercel.app' }}
