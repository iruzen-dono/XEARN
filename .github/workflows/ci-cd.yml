name: 'CI/CD Pipeline'

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    name: 'Build & Test'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xearn_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/xearn_test
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Generate Prisma client'
        run: npm run db:generate

      - name: 'Run linter'
        run: npm run lint

      - name: 'Build API'
        run: npm run build:api

      - name: 'Sync database schema'
        run: npm run db:push

      - name: 'Run tests'
        run: npm run test

      - name: 'Build frontend'
        run: npm run build:web

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
      - run: npm ci
      - name: Check for known vulnerabilities (critical = warn, high = warn)
        run: |
          npm audit --audit-level=critical || echo "::warning::Critical vulnerabilities found (non-blocking)"
          npm audit --audit-level=high || echo "::warning::High severity vulnerabilities found"
      - name: Check for secrets in code
        run: |
          if grep -rn "AKIA\|sk_live\|password\s*=\s*['\"][^'\"]*['\"]" --include="*.ts" --include="*.js" --exclude-dir=node_modules --exclude-dir=dist .; then
            echo "::warning::Potential secrets found in code"
          fi

  deploy-staging:
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: 'Deploy to Staging'
    needs: test

    environment:
      name: staging
      url: https://staging.xearn.railway.app

    steps:
      - uses: actions/checkout@v4

      # Railway auto-deploys when commits are pushed to the staging branch
      # via its GitHub integration. This job waits for the deployment to
      # become healthy before marking the pipeline as successful.
      - name: 'Wait for Railway staging deployment'
        run: |
          echo "Railway auto-deploys via GitHub integration..."
          echo "Waiting for staging services to become healthy..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging-api.xearn.railway.app/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging API is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: API returned $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Staging API did not become healthy in time"
          exit 1

      - name: 'Verify staging frontend'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.xearn.railway.app/api/health || true)
          if [ "$STATUS" != "200" ]; then
            echo "Warning: Staging frontend health check returned $STATUS"
          else
            echo "Staging frontend is healthy"
          fi

  deploy-production:
    if: false  # Temporarily disabled - not ready for production deployment
    runs-on: ubuntu-latest
    name: 'Deploy to Production'
    needs: test

    environment:
      name: production
      url: https://xearn.com

    steps:
      - uses: actions/checkout@v4

      # Railway auto-deploys when commits are pushed to main via its GitHub
      # integration. This job gates on the "production" environment approval,
      # then waits for the deployment to become healthy.
      - name: 'Wait for Railway production deployment'
        run: |
          echo "Railway auto-deploys via GitHub integration..."
          echo "Waiting for production services to become healthy..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.xearn.com/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production API is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: API returned $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Production API did not become healthy in time"
          exit 1

      - name: 'Verify production frontend'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://xearn.com/api/health || true)
          if [ "$STATUS" != "200" ]; then
            echo "Warning: Production frontend health check returned $STATUS"
          else
            echo "Production frontend is healthy"
          fi

      - name: 'Notify Slack'
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "XEARN production deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production deployment initiated*\n\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  smoke-tests:
    if: github.event_name == 'push' && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-latest
    name: 'Smoke Tests'
    needs: [deploy-staging, deploy-production]

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Install Playwright browsers'
        run: npx playwright install --with-deps chromium

      - name: 'Run smoke tests'
        run: npx playwright test --project=chromium
        working-directory: apps/web
        env:
          API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.xearn.com' || 'https://staging-api.xearn.railway.app' }}
          WEB_URL: ${{ github.ref == 'refs/heads/main' && 'https://xearn.com' || 'https://staging.xearn.vercel.app' }}
