# -----------------------------------------------------------------
# Lightweight PR Check
# -----------------------------------------------------------------
# This workflow runs lint and tests on pull requests only.
# It is NOT the primary CI/CD pipeline. See ci-cd.yml for the full
# pipeline that handles push-to-main builds, deployments, and smoke
# tests. The push trigger was removed here to prevent double-runs
# when commits land on main (ci-cd.yml already covers that).
# -----------------------------------------------------------------

name: CI - PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xearn
          POSTGRES_PASSWORD: xearn_test
          POSTGRES_DB: xearn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xearn"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://xearn:xearn_test@localhost:5432/xearn_test
      JWT_SECRET: ci-test-secret-key-minimum-length
      JWT_REFRESH_SECRET: ci-test-refresh-secret-min-len
      API_PORT: 4000
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Lint
        run: npm run lint

      - name: Test API
        run: npx jest --forceExit --ci
        working-directory: apps/api
