name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xearn
          POSTGRES_PASSWORD: xearn_test
          POSTGRES_DB: xearn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xearn"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://xearn:xearn_test@localhost:5432/xearn_test
      JWT_SECRET: ci-test-secret-key-minimum-length
      JWT_REFRESH_SECRET: ci-test-refresh-secret-min-len
      API_PORT: 4000
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --- API ---
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Build API
        run: npm run build:api

      - name: Test API
        run: npx jest --forceExit --ci
        working-directory: apps/api

      # --- Web ---
      - name: Lint Web
        run: npm run lint

      - name: Build Web
        run: npm run build:web
