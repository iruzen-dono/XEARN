services:
  postgres:
    image: postgres:16-alpine
    container_name: xearn-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: xearn
      POSTGRES_PASSWORD: xearn_password
      POSTGRES_DB: xearn_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
